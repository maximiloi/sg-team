name: Next.js Deploy to VDS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v5

      # 2. Node.js + кэш (автоматический)
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Зависимости
      - run: npm ci --frozen-lockfile

      # 4. Prisma generate (обязательно перед build)
      - name: Prisma Generate
        run: npx prisma generate --schema=prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # 5. Build (фикс для /api/clients)
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MANAGER_IDS: ${{ secrets.TELEGRAM_MANAGER_IDS }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXT_TELEMETRY_DISABLED: 1

      # 6. Подготовка деплоя (быстро через tar)
      - name: Prepare deploy
        run: |
          mkdir -p deploy
          cp -r .next deploy/
          mkdir -p deploy/public
          cp -r public/* deploy/public/ 2>/dev/null || true
          cp -r prisma deploy/
          cp -r src deploy/
          cp package*.json ecosystem.config.cjs deploy/
          ls -la deploy/.next/
          tar -czf deploy.tar.gz -C deploy .

      # 7. SSH агент
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # 7. Known hosts
      - name: Setup known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # 8. Загрузка архива
      - name: Upload deploy archive
        run: |
          scp deploy.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/

      # 9. Деплой
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MANAGER_IDS: ${{ secrets.TELEGRAM_MANAGER_IDS }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/sgt || mkdir -p /var/www/sgt && cd /var/www/sgt

            echo "📦 Backup старого билда..."
            rm -rf backup
            mkdir -p backup
            mv .next backup/.next.$(date +%Y%m%d_%H%M) 2>/dev/null || true

            echo "📦 Разархивируем новый билд..."
            tar -xzf /tmp/deploy.tar.gz -C .
            rm -f /tmp/deploy.tar.gz

            echo "🔧 Обновляем .env..."
            cat > .env << EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_MANAGER_IDS=${{ secrets.TELEGRAM_MANAGER_IDS }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            NODE_ENV=production
            EOF

            # Экспортируем переменные для текущей сессии
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
            export TELEGRAM_MANAGER_IDS="${{ secrets.TELEGRAM_MANAGER_IDS }}"
            export NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}"
            export AUTH_SECRET="${{ secrets.AUTH_SECRET }}"

            echo "⚙️ Проверяем Prisma..."
            if [ ! -d "node_modules/.prisma/client" ]; then
              echo "🔄 Устанавливаем зависимости (первый запуск)..."
              npm install --production --no-audit --no-fund
            else
              echo "✅ node_modules актуален, пропускаем npm install"
            fi

            echo "📦 До: $(du -sh .)"

            echo "🗄️ Только Prisma generate..."
            npx prisma generate --schema=prisma/schema.prisma

            echo "🗄️ ПРИМЕНЯЕМ МИГРАЦИИ БД..."
            npx prisma migrate deploy --schema=prisma/schema.prisma

            echo "🔄 PM2 reload..."
            pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs --env production
            pm2 save

            echo "📊 Аудит места:" && du -sh .[^.]* * 2>/dev/null | sort -hr | head -10

            echo "✅ Deploy завершён за $(date +%s) сек"
